backend:
  name: git-gateway
  repo: LIVEr-dev/LIVEr-website
  branch: master

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:

  - name: "portfolio"
    label: "Portfolio / Work Photos"
    label_singular: "Portfolio Item"
    folder: "content/portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "E.g. 'Social Media Campaign — Brand X'" }
      - { label: "Client Name", name: "client", widget: "string", hint: "E.g. 'T. Moyo Restaurant'" }
      - label: "Photo"
        name: "image"
        widget: "image"
        hint: "Upload your photo here — it goes live on the Work page"
      - { label: "Category", name: "category", widget: "select", options: ["Social Media", "Photography", "Paid Ads", "Branding", "Website", "Content", "Strategy"], default: "Photography" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Description (optional)", name: "description", widget: "text", required: false }

  - name: "clients"
    label: "Client Logos"
    label_singular: "Client"
    folder: "content/clients"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client / Brand Name", name: "name", widget: "string" }
      - label: "Logo Image"
        name: "logo"
        widget: "image"
        required: false
        hint: "Upload their logo. If you leave this blank, their name will show as text instead."

  - name: "posts"
    label: "Blog / Resources"
    label_singular: "Article"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Summary", name: "excerpt", widget: "text", hint: "1–2 sentences shown on the resources page" }
      - { label: "URL Slug", name: "slug", widget: "string", hint: "E.g. 'why-boosting-posts-doesnt-work' — no spaces, no capitals" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - label: "Article Body"
        name: "body"
        widget: "markdown"
        hint: "Write the full article here. You can use bold, headings, bullet points."
      - label: "Cover Image (optional)"
        name: "coverImage"
        widget: "image"
        required: false

  - name: "site_data"
    label: "Pricing & Testimonials"
    files:

      - name: "pricing"
        label: "💰 Pricing — Change any price here"
        file: "content/pricing.json"
        fields:

          - label: "Business Plans"
            name: "business"
            widget: "object"
            collapsed: false
            fields:
              - label: "Digital Foundation"
                name: "biz_foundation"
                widget: "object"
                fields:
                  - { label: "Price (number only, e.g. 150)", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Social + Content Starter"
                name: "biz_social_starter"
                widget: "object"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Ad Launchpad"
                name: "biz_ad_launchpad"
                widget: "object"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Growth Accelerator"
                name: "biz_growth_accelerator"
                widget: "object"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "WhatsApp Funnel"
                name: "biz_whatsapp_funnel"
                widget: "object"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Premium Growth Partner"
                name: "biz_premium_partner"
                widget: "object"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Outsourced Marketing Team"
                name: "biz_enterprise_team"
                widget: "object"
                fields:
                  - { label: "Price (e.g. 1.5k or 2k)", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }

          - label: "Athlete Plans"
            name: "athlete"
            widget: "object"
            collapsed: true
            fields:
              - label: "Athlete Brand Starter"
                name: "ath_brand_starter"
                widget: "object"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
