backend:
  name: git-gateway
  repo: LIVEr-dev/LIVEr-website
  branch: master

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:

  - name: "portfolio"
    label: "Portfolio / Work Photos"
    label_singular: "Portfolio Item"
    folder: "content/portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "E.g. 'Social Media Campaign — Brand X'" }
      - { label: "Client Name", name: "client", widget: "string", hint: "E.g. 'T. Moyo Restaurant'" }
      - label: "Photo"
        name: "image"
        widget: "image"
        hint: "Upload your photo here — it goes live on the Work page"
      - { label: "Category", name: "category", widget: "select", options: ["Social Media", "Photography", "Paid Ads", "Branding", "Website", "Content", "Strategy"], default: "Photography" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Description (optional)", name: "description", widget: "text", required: false }

  - name: "clients"
    label: "Client Logos"
    label_singular: "Client"
    folder: "content/clients"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client / Brand Name", name: "name", widget: "string" }
      - label: "Logo Image"
        name: "logo"
        widget: "image"
        required: false
        hint: "Upload their logo. If you leave this blank, their name will show as text instead."

  - name: "posts"
    label: "Blog / Resources"
    label_singular: "Article"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Summary", name: "excerpt", widget: "text", hint: "1–2 sentences shown on the resources page" }
      - { label: "URL Slug", name: "slug", widget: "string", hint: "E.g. 'why-boosting-posts-doesnt-work' — no spaces, no capitals" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - label: "Article Body"
        name: "body"
        widget: "markdown"
        hint: "Write the full article here. You can use bold, headings, bullet points."
      - label: "Cover Image (optional)"
        name: "coverImage"
        widget: "image"
        required: false

  - name: "site_data"
    label: "💰 Pricing & 💬 Testimonials"
    files:

      - name: "pricing"
        label: "💰 Pricing — Change any price here"
        file: "content/pricing.json"
        fields:

          - label: "🏢 Business Plans"
            name: "business"
            widget: "object"
            collapsed: false
            fields:
              - label: "Digital Foundation"
                name: "biz_foundation"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price (number only, e.g. 150)", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Social + Content Starter"
                name: "biz_social_starter"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Ad Launchpad"
                name: "biz_ad_launchpad"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Growth Accelerator"
                name: "biz_growth_accelerator"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "WhatsApp Funnel"
                name: "biz_whatsapp_funnel"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Premium Growth Partner"
                name: "biz_premium_partner"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Outsourced Marketing Team"
                name: "biz_enterprise_team"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price (e.g. 1.5k or 2k)", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }

          - label: "🏅 Athlete Plans"
            name: "athlete"
            widget: "object"
            collapsed: true
            fields:
              - label: "Athlete Brand Starter"
                name: "ath_brand_starter"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Athlete Portfolio Site"
                name: "ath_portfolio_site"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Athlete Photography"
                name: "ath_photography"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Athlete Growth System"
                name: "ath_growth_system"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }

          - label: "🎬 Creator Plans"
            name: "creator"
            widget: "object"
            collapsed: true
            fields:
              - label: "Creator Brand Setup"
                name: "cre_brand_setup"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }
              - label: "Creator Growth System"
                name: "cre_growth_system"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }

          - label: "⚡ Enterprise"
            name: "enterprise"
            widget: "object"
            collapsed: true
            fields:
              - label: "Executive Marketing Team"
                name: "ent_main"
                widget: "object"
                summary: "${{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price (e.g. 4,500)", name: "price", widget: "string" }
                  - { label: "Price period", name: "period", widget: "string" }

          - label: "🔧 Business Add-Ons"
            name: "biz_addons"
            widget: "object"
            collapsed: true
            fields:
              - label: "Logo Design"
                name: "biz_logo"
                widget: "object"
                summary: "{{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price (include $ sign, e.g. $150)", name: "price", widget: "string" }
                  - { label: "Period", name: "period", widget: "string" }
              - label: "Landing Page"
                name: "biz_landing"
                widget: "object"
                summary: "{{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Period", name: "period", widget: "string" }
              - label: "Photography Session"
                name: "biz_photo"
                widget: "object"
                summary: "{{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Period", name: "period", widget: "string" }
              - label: "SEO Setup"
                name: "biz_seo"
                widget: "object"
                summary: "{{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Period", name: "period", widget: "string" }
              - label: "Short-form Video (3x)"
                name: "biz_video"
                widget: "object"
                summary: "{{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Period", name: "period", widget: "string" }
              - label: "Extra Social Platforms"
                name: "biz_platforms"
                widget: "object"
                summary: "{{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Period", name: "period", widget: "string" }
              - label: "Monthly Maintenance"
                name: "biz_maintenance"
                widget: "object"
                summary: "{{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Period", name: "period", widget: "string" }
              - label: "Strategy Audit"
                name: "biz_audit"
                widget: "object"
                summary: "{{fields.price}} — {{fields.period}}"
                fields:
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Period", name: "period", widget: "string" }

      - name: "testimonials"
        label: "💬 Testimonials — Edit client quotes"
        file: "content/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "items"
            widget: "list"
            label_singular: "Testimonial"
            fields:
              - { label: "Quote", name: "quote", widget: "text", hint: "The client's words — no need for quote marks" }
              - { label: "Client Name", name: "name", widget: "string", hint: "E.g. T. Moyo" }
              - { label: "Role & Location", name: "role", widget: "string", hint: "E.g. Restaurant Owner · Harare" }
