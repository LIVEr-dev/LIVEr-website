<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIVEr Digital — Admin</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">

  <style>
    /* ── LOADING SCREEN ─────────────────────────────────────────────────── */
    #liver-loader {
      position: fixed; inset: 0; z-index: 99999;
      background: #0f0e14;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #liver-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem; letter-spacing: .12em;
      color: #fff; line-height: 1;
      display: flex; align-items: baseline; gap: 6px;
    }
    .loader-logo span { color: #ff3131; }
    .loader-sub {
      font-family: 'Syne', sans-serif; font-size: .7rem;
      color: rgba(255,255,255,.35); letter-spacing: .25em;
      text-transform: uppercase; margin-top: 8px;
    }
    .loader-bar {
      width: 120px; height: 2px;
      background: rgba(255,255,255,.1);
      border-radius: 2px; margin-top: 40px; overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%; width: 0%; background: #ff3131;
      border-radius: 2px;
      animation: loaderFill 1.8s ease forwards;
    }
    @keyframes loaderFill { to { width: 100%; } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:none } }

    /* ═══════════════════════════════════════════════════════════════════════
       DECAP CMS v3 THEMING — Uses CSS custom properties (the RIGHT approach)
       Decap CMS reads these vars from :root — this actually works.
    ════════════════════════════════════════════════════════════════════════ */
    :root {
      /* Brand */
      --liver-red:    #ff3131;
      --liver-dark:   #0f0e14;
      --liver-surface:#1a1925;
      --liver-border: rgba(255,255,255,.08);
      --liver-muted:  rgba(255,255,255,.4);
      --liver-white:  #f2f0fb;

      /* ── Decap CMS custom property overrides ──────────────────────── */
      color-scheme: dark;

      /* body / page */
      --body-bg-color:          #0f0e14;
      --primary-text-color:     #f2f0fb;
      --secondary-text-color:   rgba(255,255,255,.45);
      --success-text-color:     #4caf8a;
      --danger-text-color:      #ff3131;
      --disabled-text-color:    rgba(255,255,255,.2);
      --url-text-color:         #ff3131;

      /* inputs */
      --input-bg-color:         #1a1925;
      --input-border-color:     rgba(255,255,255,.12);
      --input-placeholder-color:rgba(255,255,255,.25);

      /* gray buttons */
      --btn-gray-default-bg:    #1a1925;
      --btn-gray-default-border:rgba(255,255,255,.15);
      --btn-gray-hover-bg:      #252334;
      --btn-gray-hover-border:  rgba(255,255,255,.3);
      --btn-gray-focus-bg:      #1a1925;
      --btn-gray-disabled-text: rgba(255,255,255,.2);
      --btn-gray-disabled-bg:   #13121c;
      --btn-gray-disabled-border:rgba(255,255,255,.08);

      /* red buttons */
      --btn-red-default-text:   #ff3131;
      --btn-red-default-bg:     #1a1925;
      --btn-red-default-border: rgba(255,49,49,.3);
      --btn-red-hover-text:     #fff;
      --btn-red-hover-bg:       #ff3131;
      --btn-red-hover-border:   #ff3131;
      --btn-red-active-bg:      #cc2020;
      --btn-red-active-border:  rgba(255,255,255,.1);
      --btn-red-disabled-text:  rgba(255,49,49,.4);
      --btn-red-disabled-bg:    #0f0e14;

      /* green / publish buttons */
      --btn-green-default-text:   #fff;
      --btn-green-default-bg:     #ff3131;
      --btn-green-default-border: #cc2020;
      --btn-green-hover-bg:       #cc2020;
      --btn-green-hover-border:   #ff3131;
      --btn-green-active-bg:      #aa1a1a;
      --btn-green-disabled-text:  rgba(255,255,255,.4);
      --btn-green-disabled-bg:    rgba(255,49,49,.4);
      --btn-green-disabled-border:transparent;

      /* scrollbar */
      --scrollbar-thumb-color:       rgba(255,49,49,.35);
      --scrollbar-thumb-hover-color: rgba(255,49,49,.6);

      /* dropdown */
      --dropdownlist-bg:      #1a1925;
      --dropdownlist-border:  rgba(255,255,255,.1);
      --dropdownlist-shadow:  0 16px 32px rgba(0,0,0,.7);
      --dropdownitem-bg:      #1a1925;
      --dropdownitem-hover-bg:#252334;

      /* header */
      --header-bg:                   #13121c;
      --header-button-text:          rgba(255,255,255,.4);
      --header-button-text-hover:    rgba(255,255,255,.8);
      --header-button-text-active:   #fff;
      --header-dropdownitem-hover-text: #fff;
      --header-dropdownitem-hover-bg:   rgba(255,49,49,.15);

      /* cards */
      --card-bg:          #1a1925;
      --card-border:      rgba(255,255,255,.08);
      --card-hover-bg:    #1f1d2e;
      --card-active-border:#ff3131;

      /* modals */
      --modal-bg-color:     #1a1925;
      --modal-border-color: rgba(255,255,255,.1);
      --modal-box-shadow:   0 0 40px rgba(0,0,0,.6);

      /* widgets / editor fields */
      --widgets-bg-color:            #13121c;
      --widgets-label-bg-color:      #1a1925;
      --widgets-border-color:        rgba(255,255,255,.1);
      --widgets-active-label-bg-color: #ff3131;
      --widgets-active-border-color:   #ff3131;
      --widgets-error-label-bg-color:  #ff3131;
      --widgets-error-border-color:    #ff3131;

      /* date picker */
      --rdtPicker-bg-color:     #1a1925;
      --rdtPicker-border-color: rgba(255,255,255,.1);
      --rdtPicker-shadow:       0 16px 32px rgba(0,0,0,.7);
      --rdtPicker-hover-bg-color: #252334;
      --rdtPicker-active-bg-color:#ff3131;

      /* color picker */
      --color-picker-bg-color:    #1a1925;
      --color-picker-border-color:rgba(255,255,255,.1);
      --color-picker-shadow:      0 16px 32px rgba(0,0,0,.7);

      /* toggle */
      --toggle-true-bg-color:  #ff3131;
      --toggle-false-bg-color: rgba(255,255,255,.15);
      --toggle-handle-color:   #f2f0fb;

      /* topbar / code */
      --topbar-bg-color:        #13121c;
      --short-code-bg-color:    rgba(255,255,255,.1);
      --code-block-bg-color:    #13121c;
      --code-line-number-color: rgba(255,255,255,.3);

      /* checkerboard (image widget bg) */
      --checkerboard-dark-color:  #1a1925;
      --checkerboard-bg-color:    #252334;
    }

    /* ── BASE ────────────────────────────────────────────────────────────── */
    html, body {
      background-color: var(--body-bg-color) !important;
      color: var(--primary-text-color) !important;
      font-family: 'Syne', sans-serif;
    }

    /* ── SCROLLBARS ─────────────────────────────────────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb-color) transparent; }
    *::-webkit-scrollbar { width: 4px; height: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb-color); border-radius: 4px; }
    *::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover-color); }

    /* ── NAMED-FRAGMENT CLASS OVERRIDES (stable across Decap CMS versions) ── */

    /* Buttons: gray / neutral */
    [class*="button-default-gray"],
    [class*="button-medium-gray"],
    [class*="button-default-disabled"],
    [class*="button-default-lightBlue"],
    [class*="AddButton-button"],
    [class*="FileWidgetButton-button"],
    [class*="SaveButton-lightBlue"],
    [class*="StatusButton"],
    [class*="StyledDropdownButton"]:not([class*="grayText"]):not([class*="Publish"]) {
      color: var(--primary-text-color) !important;
      background-color: var(--btn-gray-default-bg) !important;
      border: 1px solid var(--btn-gray-default-border) !important;
      border-radius: 8px !important;
      font-family: 'Syne', sans-serif !important;
      font-weight: 700 !important;
      transition: background-color .15s, border-color .15s !important;
    }
    [class*="button-default-gray"]:hover,
    [class*="button-medium-gray"]:hover,
    [class*="AddButton-button"]:hover,
    [class*="FileWidgetButton-button"]:hover,
    [class*="StatusButton"]:hover {
      background-color: var(--btn-gray-hover-bg) !important;
      border-color: var(--btn-gray-hover-border) !important;
    }

    /* Buttons: red / delete */
    [class*="utton-lightRed"],
    [class*="FileWidgetButtonRemove-button"],
    [class*="DeleteButton"] {
      color: var(--btn-red-default-text) !important;
      background-color: var(--btn-red-default-bg) !important;
      border: 1px solid var(--btn-red-default-border) !important;
      border-radius: 8px !important;
      font-family: 'Syne', sans-serif !important;
      font-weight: 700 !important;
    }
    [class*="utton-lightRed"]:hover,
    [class*="FileWidgetButtonRemove-button"]:hover,
    [class*="DeleteButton"]:hover {
      color: var(--btn-red-hover-text) !important;
      background-color: var(--btn-red-hover-bg) !important;
    }

    /* Buttons: publish / green → brand red */
    [class*="button-green"],
    [class*="PublishButton"],
    [class*="publishedButton"] {
      color: var(--btn-green-default-text) !important;
      background-color: var(--btn-green-default-bg) !important;
      border: 1px solid var(--btn-green-default-border) !important;
      border-radius: 8px !important;
      font-family: 'Syne', sans-serif !important;
      font-weight: 700 !important;
    }
    [class*="button-green"]:hover,
    [class*="PublishButton"]:hover,
    [class*="publishedButton"]:hover {
      background-color: var(--btn-green-hover-bg) !important;
    }

    /* Notifications */
    [class*="toast-success"] {
      color: var(--success-text-color) !important;
      background-color: var(--dropdownitem-bg) !important;
      box-shadow: var(--dropdownlist-shadow) !important;
      border-radius: 10px !important;
      font-family: 'Syne', sans-serif !important;
    }
    [class*="toast-danger"] {
      color: var(--danger-text-color) !important;
      background-color: var(--dropdownitem-bg) !important;
      box-shadow: var(--dropdownlist-shadow) !important;
      border-radius: 10px !important;
      font-family: 'Syne', sans-serif !important;
    }

    /* Dropdowns */
    ul[class*="dropdownList"],
    ul[class*="Suggestions"],
    [class*="ControlContainer"] [class*="menu"] {
      background-color: var(--dropdownlist-bg) !important;
      border: 1px solid var(--dropdownlist-border) !important;
      border-radius: 8px !important;
      box-shadow: var(--dropdownlist-shadow) !important;
    }
    ul[class*="dropdownList"] > [class*="dropdownItem"],
    ul[class*="Suggestions"] > li[class*="SuggestionItem"],
    [class*="ControlContainer"] [class*="menu"] [class*="option"] {
      color: var(--primary-text-color) !important;
      background-color: var(--dropdownitem-bg) !important;
    }
    ul[class*="dropdownList"] > [class*="dropdownItem"]:hover,
    ul[class*="Suggestions"] > li[class*="SuggestionItem"]:hover,
    [class*="ControlContainer"] [class*="menu"] [class*="option"]:hover {
      background-color: var(--dropdownitem-hover-bg) !important;
    }

    /* ── SIDEBAR BRAND HEADER ────────────────────────────────────────────── */
    #liver-brand {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--liver-border);
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    #liver-brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: .1em;
      color: #fff;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    #liver-brand-name span { color: var(--liver-red); }
    #liver-brand-sub {
      font-family: 'Syne', sans-serif;
      font-size: .62rem;
      color: var(--liver-muted);
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── HIDE NETLIFY CREDIT ICON ───────────────────────────────────────── */
    [class*="NetlifyCreditIcon"],
    [class*="PageLogoIcon"] { display: none !important; }

    /* ── SLATE EDITOR FIX ────────────────────────────────────────────────── */
    [data-slate-editor] { -webkit-user-modify: read-write !important; }

    /* ── IDENTITY WIDGET Z-INDEX ─────────────────────────────────────────── */
    iframe#netlify-identity-widget { z-index: 400 !important; }
  </style>
</head>
<body>

  <!-- Branded loading screen -->
  <div id="liver-loader">
    <div class="loader-logo">LIV<span>E</span>r</div>
    <div class="loader-sub">Admin Panel</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <div id="nc-root"></div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Hide loader once CMS has mounted
    function hideLogo() {
      var el = document.getElementById('liver-loader');
      if (el) el.classList.add('hidden');
    }

    var observer = new MutationObserver(function() {
      var root = document.getElementById('nc-root');
      if (root && root.children.length > 0) {
        setTimeout(hideLogo, 400);
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
    setTimeout(hideLogo, 4000);

    // ── KEYBOARD SHORTCUT: Ctrl+S = Publish ─────────────────────────
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        var publishBtn = document.querySelector('[class*="PublishButton"], [class*="publish-button"]');
        if (publishBtn) {
          publishBtn.click();
          var flash = document.createElement('div');
          flash.style.cssText = 'position:fixed;top:20px;right:20px;z-index:99999;background:#ff3131;color:#fff;font-family:Syne,sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.06em;padding:10px 18px;border-radius:8px;opacity:1;transition:opacity .5s';
          flash.textContent = '✓ Publishing...';
          document.body.appendChild(flash);
          setTimeout(function(){ flash.style.opacity='0'; setTimeout(function(){ flash.remove(); },500); }, 2000);
        }
      }
    });

    // ── WELCOME MESSAGE ────────────────────────────────────────────
    var shown = sessionStorage.getItem('liver-welcomed');
    if (!shown) {
      sessionStorage.setItem('liver-welcomed', '1');
      setTimeout(function() {
        var msg = document.createElement('div');
        msg.style.cssText = 'position:fixed;bottom:24px;left:24px;z-index:99999;background:#1a1925;border:1px solid rgba(255,49,49,.3);border-radius:12px;padding:16px 20px;font-family:Syne,sans-serif;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:fadeUp .4s ease';
        msg.innerHTML = '<div style="font-weight:800;font-size:.82rem;color:#f2f0fb;margin-bottom:4px;">👋 Welcome to LIVEr Admin</div><div style="font-size:.72rem;color:rgba(255,255,255,.45);line-height:1.6;">Go to <strong style="color:#ff3131">Pricing & Testimonials → Pricing</strong> to change any price. Hit <strong style="color:#ff3131">Ctrl+S</strong> to publish fast.</div><button onclick="this.parentElement.remove()" style="position:absolute;top:10px;right:12px;background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:.9rem">✕</button>';
        document.body.appendChild(msg);
        setTimeout(function(){ msg.style.opacity='0'; msg.style.transition='opacity .5s'; setTimeout(function(){ msg.remove(); },500); }, 8000);
      }, 1500);
    }

    // Netlify Identity redirect handler
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
